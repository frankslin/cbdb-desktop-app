name: Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (must match Cbdb.App.Avalonia.csproj)
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia tests
        run: dotnet restore Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj --configfile NuGet.Config

      - name: Run Avalonia tests
        run: >
          dotnet test Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj
          -c Release
          --no-restore
          -p:UseSharedCompilation=false
          -maxcpucount:1
          -nodeReuse:false

  build-windows:
    runs-on: windows-latest
    needs: test
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj"
          $projectVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "Could not read <Version> from Cbdb.App.Avalonia.csproj"
          }
          if ($projectVersion -ne $env:RELEASE_VERSION) {
            throw "Release version '$env:RELEASE_VERSION' does not match project version '$projectVersion'"
          }

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Cbdb.WindowsApp.sln --configfile NuGet.Config

      - name: Publish self-contained win-x64 app
        run: >
          dotnet publish Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:UseAppHost=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/win-x64

      - name: Copy bundled data and docs
        shell: pwsh
        run: |
          if (Test-Path data) {
            Copy-Item data artifacts/publish/win-x64/data -Recurse -Force
          }
          Copy-Item THIRD-PARTY-LICENSES.md artifacts/publish/win-x64/THIRD-PARTY-LICENSES.md

      - name: Archive win-x64 package
        shell: pwsh
        run: |
          $zipPath = "artifacts/publish/cbdb-$env:RELEASE_VERSION-win-x64.zip"
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath $zipPath -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-win-x64
          path: artifacts/publish/cbdb-${{ env.RELEASE_VERSION }}-win-x64.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - osx-arm64
          - osx-x64
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj | head -n 1)"
          if [ -z "${project_version}" ]; then
            echo "Could not read <Version> from Cbdb.App.Avalonia.csproj" >&2
            exit 1
          fi
          if [ "${project_version}" != "${RELEASE_VERSION}" ]; then
            echo "Release version '${RELEASE_VERSION}' does not match project version '${project_version}'" >&2
            exit 1
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia app
        run: dotnet restore Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj --configfile NuGet.Config

      - name: Publish Avalonia app
        run: >
          dotnet publish Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:UseAppHost=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/${{ matrix.runtime }}/publish

      - name: Create app bundle
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          app_root="artifacts/publish/${runtime}/Cbdb.app"
          contents_dir="${app_root}/Contents"
          macos_dir="${contents_dir}/MacOS"
          resources_dir="${contents_dir}/Resources"
          publish_dir="artifacts/publish/${runtime}/publish"
          icon_source="Cbdb.App.Avalonia/Assets/AppIcon.icns"

          mkdir -p "${macos_dir}" "${resources_dir}"
          cp -R "${publish_dir}/." "${macos_dir}/"

          if [ ! -f "${icon_source}" ]; then
            echo "Missing macOS app icon: ${icon_source}" >&2
            exit 1
          fi

          cp "${icon_source}" "${resources_dir}/AppIcon.icns"

          cat > "${contents_dir}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>CBDB</string>
              <key>CFBundleIdentifier</key>
              <string>org.cbdb.desktop</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleDisplayName</key>
              <string>CBDB</string>
              <key>CFBundleName</key>
              <string>CBDB</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${RELEASE_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
            </dict>
          </plist>
          EOF

          chmod +x "${macos_dir}/CBDB"

      - name: Copy bundled data and docs
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          app_root="artifacts/publish/${runtime}/Cbdb.app"
          macos_dir="${app_root}/Contents/MacOS"

          if [ -d data ]; then
            cp -R data "${macos_dir}/data"
          fi

          cp THIRD-PARTY-LICENSES.md "${macos_dir}/THIRD-PARTY-LICENSES.md"

      - name: Archive app bundle
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          archive_dir="artifacts/publish/${runtime}"
          ditto -c -k --sequesterRsrc --keepParent "${archive_dir}/Cbdb.app" "${archive_dir}/cbdb-${RELEASE_VERSION}-${runtime}.zip"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/cbdb-${{ env.RELEASE_VERSION }}-${{ matrix.runtime }}.zip
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download win-x64 asset
        uses: actions/download-artifact@v4
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-win-x64
          path: artifacts/release

      - name: Download osx-arm64 asset
        uses: actions/download-artifact@v4
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-osx-arm64
          path: artifacts/release

      - name: Download osx-x64 asset
        uses: actions/download-artifact@v4
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-osx-x64
          path: artifacts/release

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release v${RELEASE_VERSION} already exists." >&2
            exit 1
          fi

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          release_notes="$(cat <<EOF
          CBDB ${RELEASE_VERSION}

          - cbdb-${RELEASE_VERSION}-win-x64.zip
          - cbdb-${RELEASE_VERSION}-osx-arm64.zip
          - cbdb-${RELEASE_VERSION}-osx-x64.zip
          EOF
          )"
          gh release create "v${RELEASE_VERSION}" \
            artifacts/release/cbdb-${RELEASE_VERSION}-win-x64.zip \
            artifacts/release/cbdb-${RELEASE_VERSION}-osx-arm64.zip \
            artifacts/release/cbdb-${RELEASE_VERSION}-osx-x64.zip \
            --target "${GITHUB_SHA}" \
            --title "CBDB ${RELEASE_VERSION}" \
            --notes "${release_notes}"

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/v${RELEASE_VERSION}"
          {
            echo "## Release created"
            echo
            echo "- Tag: v${RELEASE_VERSION}"
            echo "- Release: ${release_url}"
          } >> "$GITHUB_STEP_SUMMARY"
