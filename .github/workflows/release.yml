name: Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (must match Cbdb.App.Avalonia.csproj)
        required: true
        type: string

permissions:
  contents: write

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia tests
        run: dotnet restore Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj --configfile NuGet.Config

      - name: Run Avalonia tests
        run: >
          dotnet test Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj
          -c Release
          --no-restore
          -p:UseSharedCompilation=false
          -maxcpucount:1
          -nodeReuse:false

  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia tests
        run: dotnet restore Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj --configfile NuGet.Config

      - name: Run Avalonia tests
        run: >
          dotnet test Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj
          -c Release
          --no-restore
          -p:UseSharedCompilation=false
          -maxcpucount:1
          -nodeReuse:false

  build-windows:
    runs-on: windows-latest
    needs: test-windows
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj"
          $projectVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "Could not read <Version> from Cbdb.App.Avalonia.csproj"
          }
          if ($projectVersion -ne $env:RELEASE_VERSION) {
            throw "Release version '$env:RELEASE_VERSION' does not match project version '$projectVersion'"
          }

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Cbdb.WindowsApp.sln --configfile NuGet.Config

      - name: Publish self-contained win-x64 app
        run: >
          dotnet publish Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:UseAppHost=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/win-x64

      - name: Copy bundled data and docs
        shell: pwsh
        run: |
          if (Test-Path data) {
            Copy-Item data artifacts/publish/win-x64/data -Recurse -Force
          }
          Copy-Item THIRD-PARTY-LICENSES.md artifacts/publish/win-x64/THIRD-PARTY-LICENSES.md

      - name: Archive win-x64 package
        shell: pwsh
        run: |
          $zipPath = "artifacts/publish/cbdb-$env:RELEASE_VERSION-win-x64.zip"
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath $zipPath -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v6
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-win-x64
          path: artifacts/publish/cbdb-${{ env.RELEASE_VERSION }}-win-x64.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: test-macos
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - osx-arm64
          - osx-x64
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj | head -n 1)"
          if [ -z "${project_version}" ]; then
            echo "Could not read <Version> from Cbdb.App.Avalonia.csproj" >&2
            exit 1
          fi
          if [ "${project_version}" != "${RELEASE_VERSION}" ]; then
            echo "Release version '${RELEASE_VERSION}' does not match project version '${project_version}'" >&2
            exit 1
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cert_path="${RUNNER_TEMP}/cbdb-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/cbdb-signing.keychain-db"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${cert_path}"

          security create-keychain -p "" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "" "${keychain_path}"
          security import "${cert_path}" -k "${keychain_path}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" login.keychain-db

      - name: Write App Store Connect API key
        if: ${{ env.APPLE_KEY_ID != '' && env.APPLE_ISSUER_ID != '' && env.APPLE_API_KEY_P8 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          key_file="${RUNNER_TEMP}/AuthKey_${APPLE_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_file}"
          echo "APPLE_API_KEY_FILE=${key_file}" >> "$GITHUB_ENV"

      - name: Build macOS bundle
        shell: bash
        env:
          APPLE_API_KEY_FILE: ${{ env.APPLE_API_KEY_FILE }}
        run: |
          set -euo pipefail
          args=(
            --runtime "${{ matrix.runtime }}"
            --configuration Release
            --output-dir "artifacts/publish/${{ matrix.runtime }}"
            --version "${RELEASE_VERSION}"
          )
          if [[ -n "${MACOS_SIGN_IDENTITY:-}" ]]; then
            args+=(--sign-identity "${MACOS_SIGN_IDENTITY}")
          fi
          if [[ -n "${APPLE_KEY_ID:-}" && -n "${APPLE_ISSUER_ID:-}" && -n "${APPLE_API_KEY_FILE:-}" ]]; then
            args+=(--notarize --apple-key-id "${APPLE_KEY_ID}" --apple-issuer-id "${APPLE_ISSUER_ID}" --apple-api-key-file "${APPLE_API_KEY_FILE}")
          fi
          scripts/build_macos_bundle.sh "${args[@]}"

      - name: Upload release asset
        uses: actions/upload-artifact@v6
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/cbdb-${{ env.RELEASE_VERSION }}-${{ matrix.runtime }}.zip
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download win-x64 asset
        uses: actions/download-artifact@v8
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-win-x64
          path: artifacts/release

      - name: Download osx-arm64 asset
        uses: actions/download-artifact@v8
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-osx-arm64
          path: artifacts/release

      - name: Download osx-x64 asset
        uses: actions/download-artifact@v8
        with:
          name: cbdb-${{ env.RELEASE_VERSION }}-osx-x64
          path: artifacts/release

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release v${RELEASE_VERSION} already exists." >&2
            exit 1
          fi

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "RELEASE_NOTES.md" ]; then
            echo "RELEASE_NOTES.md not found" >&2
            exit 1
          fi
          gh release create "v${RELEASE_VERSION}" \
            artifacts/release/cbdb-${RELEASE_VERSION}-win-x64.zip \
            artifacts/release/cbdb-${RELEASE_VERSION}-osx-arm64.zip \
            artifacts/release/cbdb-${RELEASE_VERSION}-osx-x64.zip \
            --target "${GITHUB_SHA}" \
            --title "CBDB Desktop ${RELEASE_VERSION}" \
            --notes-file "RELEASE_NOTES.md"

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/v${RELEASE_VERSION}"
          {
            echo "## Release created"
            echo
            echo "- Tag: v${RELEASE_VERSION}"
            echo "- Release: ${release_url}"
          } >> "$GITHUB_STEP_SUMMARY"
