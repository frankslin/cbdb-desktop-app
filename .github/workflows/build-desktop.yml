name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Cbdb.WindowsApp.sln --configfile NuGet.Config

      - name: Publish self-contained win-x64 app
        run: >
          dotnet publish Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:UseAppHost=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/win-x64

      - name: Copy bundled data and docs
        shell: pwsh
        run: |
          if (Test-Path data) {
            Copy-Item data artifacts/publish/win-x64/data -Recurse -Force
          }
          Copy-Item THIRD-PARTY-LICENSES.md artifacts/publish/win-x64/THIRD-PARTY-LICENSES.md
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbdb-0.1.0-win-x64
          path: artifacts/publish/win-x64
          if-no-files-found: error
