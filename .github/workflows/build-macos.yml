name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - osx-arm64
          - osx-x64
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj | head -n 1)"
          if [ -z "${version}" ]; then
            echo "Could not read <Version> from Cbdb.App.Avalonia.csproj" >&2
            exit 1
          fi
          echo "APP_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia tests
        run: dotnet restore Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj --configfile NuGet.Config

      - name: Run Avalonia tests
        run: >
          dotnet test Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj
          -c Release
          --no-restore
          -p:UseSharedCompilation=false
          -maxcpucount:1
          -nodeReuse:false

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cert_path="${RUNNER_TEMP}/cbdb-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/cbdb-signing.keychain-db"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${cert_path}"

          security create-keychain -p "" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "" "${keychain_path}"
          security import "${cert_path}" -k "${keychain_path}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" login.keychain-db

      - name: Write App Store Connect API key
        if: ${{ env.APPLE_KEY_ID != '' && env.APPLE_ISSUER_ID != '' && env.APPLE_API_KEY_P8 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          key_file="${RUNNER_TEMP}/AuthKey_${APPLE_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_file}"
          echo "APPLE_API_KEY_FILE=${key_file}" >> "$GITHUB_ENV"

      - name: Build macOS bundle
        shell: bash
        env:
          APPLE_API_KEY_FILE: ${{ env.APPLE_API_KEY_FILE }}
        run: |
          set -euo pipefail
          args=(
            --runtime "${{ matrix.runtime }}"
            --configuration Release
            --output-dir "artifacts/publish/${{ matrix.runtime }}"
            --version "${APP_VERSION}"
          )
          if [[ -n "${MACOS_SIGN_IDENTITY:-}" ]]; then
            args+=(--sign-identity "${MACOS_SIGN_IDENTITY}")
          fi
          if [[ -n "${APPLE_KEY_ID:-}" && -n "${APPLE_ISSUER_ID:-}" && -n "${APPLE_API_KEY_FILE:-}" ]]; then
            args+=(--notarize --apple-key-id "${APPLE_KEY_ID}" --apple-issuer-id "${APPLE_ISSUER_ID}" --apple-api-key-file "${APPLE_API_KEY_FILE}")
          fi
          scripts/build_macos_bundle.sh "${args[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: cbdb-${{ env.APP_VERSION }}-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/cbdb-${{ env.APP_VERSION }}-${{ matrix.runtime }}.dmg
          if-no-files-found: error
