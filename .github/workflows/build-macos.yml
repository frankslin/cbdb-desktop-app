name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - osx-arm64
          - osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj | head -n 1)"
          if [ -z "${version}" ]; then
            echo "Could not read <Version> from Cbdb.App.Avalonia.csproj" >&2
            exit 1
          fi
          echo "APP_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Avalonia tests
        run: dotnet restore Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj --configfile NuGet.Config

      - name: Run Avalonia tests
        run: >
          dotnet test Cbdb.App.Avalonia.Tests/Cbdb.App.Avalonia.Tests.csproj
          -c Release
          --no-restore
          -p:UseSharedCompilation=false
          -maxcpucount:1
          -nodeReuse:false

      - name: Publish Avalonia app
        run: >
          dotnet publish Cbdb.App.Avalonia/Cbdb.App.Avalonia.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:UseAppHost=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/${{ matrix.runtime }}/publish

      - name: Create app bundle
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          app_root="artifacts/publish/${runtime}/Cbdb.app"
          contents_dir="${app_root}/Contents"
          macos_dir="${contents_dir}/MacOS"
          resources_dir="${contents_dir}/Resources"
          publish_dir="artifacts/publish/${runtime}/publish"
          icon_source="Cbdb.App.Avalonia/Assets/AppIcon.icns"

          mkdir -p "${macos_dir}" "${resources_dir}"

          cp -R "${publish_dir}/." "${macos_dir}/"

          if [ ! -f "${icon_source}" ]; then
            echo "Missing macOS app icon: ${icon_source}" >&2
            exit 1
          fi

          cp "${icon_source}" "${resources_dir}/AppIcon.icns"

          cat > "${contents_dir}/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>CBDB</string>
              <key>CFBundleIdentifier</key>
              <string>org.cbdb.desktop</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleDisplayName</key>
              <string>CBDB</string>
              <key>CFBundleName</key>
              <string>CBDB</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
            </dict>
          </plist>
          EOF

          chmod +x "${macos_dir}/CBDB"

      - name: Copy bundled data and docs
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          app_root="artifacts/publish/${runtime}/Cbdb.app"
          macos_dir="${app_root}/Contents/MacOS"

          if [ -d data ]; then
            cp -R data "${macos_dir}/data"
          fi

          cp THIRD-PARTY-LICENSES.md "${macos_dir}/THIRD-PARTY-LICENSES.md"

      - name: Archive app bundle
        shell: bash
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          archive_dir="artifacts/publish/${runtime}"
          ditto -c -k --sequesterRsrc --keepParent "${archive_dir}/Cbdb.app" "${archive_dir}/Cbdb-${APP_VERSION}-${runtime}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbdb-${{ env.APP_VERSION }}-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/Cbdb-${{ env.APP_VERSION }}-${{ matrix.runtime }}.zip
          if-no-files-found: error
